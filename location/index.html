<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>定位中...</title>
  <style>
    body{text-align:center;padding-top:50px;font-size:16px;}
  </style>
</head>
<body>
  正在获取定位，请稍候…

  <script>
    // 获取从 A 页面传过来的返回地址
    const params = new URLSearchParams(window.location.search)
    const backUrl = decodeURIComponent(params.get('backUrl') || '')

    if (!backUrl) {
      alert('无效的返回地址')
      window.close()
    }

    // HTTPS 环境可以正常定位
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const url = new URL(backUrl)
        url.searchParams.set('lng', pos.coords.longitude)
        url.searchParams.set('lat', pos.coords.latitude)
        url.searchParams.set('accuracy', pos.coords.accuracy)

        // 跳回你的 A 页面
        window.location.href = url.href
      },
      (err) => {
        alert('定位失败：' + err.message)
        window.location.href = backUrl
      }
    )
  </script>
</body>
</html>
