<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<script>
  const params = new URLSearchParams(window.location.search);
  const backUrl = decodeURIComponent(params.get('backUrl') || '');

<p>  &#x2F;&#x2F; ✅【关键】强制启用 GPS 高精度定位<br>  navigator.geolocation.getCurrentPosition(<br>    (pos) &#x3D;&gt; {<br>      const data &#x3D; {<br>        lng: pos.coords.longitude,<br>        lat: pos.coords.latitude,<br>        accuracy: pos.coords.accuracy,<br>        source: “GPS” &#x2F;&#x2F; 标识来自GPS<br>      };<br>      window.location.href &#x3D; <code>$&#123;backUrl&#125;&amp;lng=$&#123;data.lng&#125;&amp;lat=$&#123;data.lat&#125;&amp;accuracy=$&#123;data.accuracy&#125;</code>;<br>    },<br>    (err) &#x3D;&gt; {<br>      window.location.href &#x3D; backUrl;<br>    },<br>    &#x2F;&#x2F; ✅ 这里开启高精度 &#x3D; 强制手机使用 GPS！<br>    {<br>      enableHighAccuracy: true,<br>      timeout: 10000,<br>      maximumAge: 0<br>    }<br>  );<br></script></p>
</body>
</html>
